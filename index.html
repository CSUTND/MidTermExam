<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css" />    

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>Random User Generator</title>

</head>
<body>
  <div>

      <!-- Navigation -->
      <nav class="navbar navbar-expand-sm bg-dark">
        <div class="container-fluid justify-content-center">

          <div class="d-flex flex-column align-items-center">

            <div>
              <button id="loghub-btn" class="btn btn-light m-1">Home</button>
              <button id="loghub-btn" class="btn btn-light m-1">GitHub</button>
            </div>

            <form class="d-flex mb-2">
              <input class="form-control me-2 rounded" type="text" placeholder="Search">
            </form>

            <div>
              <button id="next-btn" class="btn btn-primary m-1">Log In</button>
              <button id="next-btn" class="btn btn-success m-1">Sign Up</button>
            </div>

          </div>

        </div>
      </nav>  


      <!-- Header -->
      <div class="text-center mt-4">
        <h1>CSCI 3342 Midterm Exam</h1>
        <h2>Random User Generator</h2>
      </div>

      
      <!-- Main Content: Profile Card -->    
      <div class="profile-container">
        <div class="profile">
          <div class="image">
            <img src="./images/user.jpg" />
          </div>
          <div class="details">
            <p>Name: <span id="name">Full name</span></p>
            <p>Email:
              <span id="email">email@gmail.com</span>
            </p>
            <p>Location: <span id="address">Edinburg, TX</span></p>
            <p>Age: <span id="age">30</span></p>
          </div>
        </div>
      </div>

      <!-- Next Button -->
      <div class="next">
        <button id="next-btn" class="relative bg-black text-white px-4 py-2 rounded w-full my-4">
          Next Profile
        </button>
      </div>
      
      <script src="js/script.js"></script>
  </div>  
</body>
</html>
